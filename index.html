<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafuz Alam · Developer Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Modern gradient background */
        :root { --bg: #0a0a0a; --card: #1a1a1a; --accent: #6c63ff; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .profile { display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); }
        .projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .project-card { background: var(--card); padding: 1.5rem; border-radius: 12px; transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-5px); border-left: 4px solid var(--accent); }
        .github-link { display: inline-block; margin-top: 1rem; color: var(--accent); text-decoration: none; }
        /* Add more modern styling here */
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="https://github.com/official-mafuzalam.png" alt="Mafuz Alam" class="avatar">
            <div>
                <h1>Mafuz Alam</h1>
                <p>Full-stack developer & open source contributor</p>
                <div class="social-links">
                    <a href="https://github.com/official-mafuzalam"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </div>
        
        <h2>Featured Projects</h2>
        <div class="projects">
            <!-- Fetch GitHub repos via API or manually add -->
            <div class="project-card">
                <h3>Project Name</h3>
                <p>Description of the project and technologies used.</p>
                <a href="#" class="github-link">View on GitHub →</a>
            </div>
        </div>
    </div>
    <script>
        // Fetch GitHub profile and repos dynamically
        fetch('https://api.github.com/users/official-mafuzalam')
            .then(res => res.json())
            .then(data => {
                // Update profile with real data
                document.querySelector('h1').textContent = data.name || data.login;
                document.querySelector('p').textContent = data.bio || 'Developer';
                // Fetch repos and populate project cards
            });
    </script>
</body>
</html>
